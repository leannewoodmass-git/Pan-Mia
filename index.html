// ─── Shared helpers ───────────────────────────────────────────────────────────

function Badge({ color, children }) {
  return (
    <span style={{
      background: color + "22", color, fontSize: "11px", fontWeight: 700,
      padding: "2px 8px", borderRadius: "4px", letterSpacing: "0.04em",
      textTransform: "uppercase", flexShrink: 0,
    }}>{children}</span>
  );
}

// ─── CatPhoto ────────────────────────────────────────────────────────────────

function CatPhoto({ name, size = 88 }) {
  const cfg = catConfig[name];
  const [err, setErr] = useState(false);
  return err ? (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: cfg.color + "22", border: `2px solid ${cfg.color}44`,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: size * 0.45, flexShrink: 0,
    }}>{cfg.emoji}</div>
  ) : (
    <img
      src={cfg.photo}
      alt={name}
      onError={() => setErr(true)}
      style={{
        width: size, height: size, borderRadius: "50%", objectFit: "cover",
        border: `3px solid ${cfg.color}66`, flexShrink: 0,
      }}
    />
  );
}

// ─── TimelineEvent ────────────────────────────────────────────────────────────

function TimelineEvent({ event, isLast }) {
  const [expanded, setExpanded] = useState(false);
  const type = typeConfig[event.type];
  const cfg  = catConfig[event.cat];

  return (
    <div style={{ display: "flex", gap: "14px", marginBottom: isLast ? 0 : "4px" }}>
      {/* Spine dot */}
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: "38px", flexShrink: 0 }}>
        <div
          onClick={() => setExpanded(!expanded)}
          title={type.label}
          style={{
            width: "36px", height: "36px", borderRadius: "50%",
            background: type.color, display: "flex", alignItems: "center",
            justifyContent: "center", fontSize: "16px", cursor: "pointer",
            boxShadow: `0 0 0 3px ${type.color}33`, transition: "transform 0.15s",
          }}
          onMouseEnter={e => e.currentTarget.style.transform = "scale(1.15)"}
          onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
        >{type.icon}</div>
        {!isLast && <div style={{ width: "2px", flexGrow: 1, background: "#1E293B", marginTop: "4px" }} />}
      </div>

      {/* Card */}
      <div style={{ paddingBottom: isLast ? 0 : "18px", flex: 1, minWidth: 0 }}>
        <div
          onClick={() => setExpanded(!expanded)}
          style={{
            background: "#0F172A", border: "1px solid #1E293B",
            borderLeft: `3px solid ${cfg.color}`,
            borderRadius: "8px", padding: "12px 14px",
            cursor: "pointer", transition: "background 0.15s",
          }}
          onMouseEnter={e => e.currentTarget.style.background = "#1E293B"}
          onMouseLeave={e => e.currentTarget.style.background = "#0F172A"}
        >
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px" }}>
            <div style={{ minWidth: 0 }}>
              <Badge color={type.color}>{type.label}</Badge>
              <div style={{ fontWeight: 700, color: "#F1F5F9", fontSize: "15px", marginTop: "5px" }}>{event.title}</div>
            </div>
            <div style={{ color: "#94A3B8", fontSize: "12px", whiteSpace: "nowrap", flexShrink: 0, marginTop: "2px" }}>
              {event.label}
            </div>
          </div>
          {expanded && (
            <div style={{
              marginTop: "10px", color: "#94A3B8", fontSize: "14px", lineHeight: "1.7",
              borderTop: "1px solid #1E293B", paddingTop: "10px",
            }}>
              {event.details.split("\n").map((line, i) => (
                <div key={i}>{line}</div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── CatColumn ───────────────────────────────────────────────────────────────

function CatColumn({ name, typeFilter, search }) {
  const isMobile = useIsMobile();
  const cfg    = catConfig[name];
  const events = name === "Pan" ? panEvents : miaEvents;
  const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth() + 3);
  const care   = upcomingCare.filter(c => c.cat === name && new Date(c.dueDate) <= cutoff);
  const weights = weightHistory[name];
  const latestWeight = weights[weights.length - 1];
  const lastVisit = [...events].filter(e => e.type === "visit").sort((a,b) => b.date.localeCompare(a.date))[0];
  const lastLabs  = [...events].filter(e => e.type === "labs" ).sort((a,b) => b.date.localeCompare(a.date))[0];

  const filtered = useMemo(() => {
    return [...events]
      .filter(e => {
        const typeMatch   = typeFilter === "All" || e.type === typeFilter;
        const q           = search.toLowerCase();
        const searchMatch = !q || e.title.toLowerCase().includes(q) || e.details.toLowerCase().includes(q);
        return typeMatch && searchMatch;
      })
      .sort((a, b) => b.date.localeCompare(a.date));
  }, [events, typeFilter, search]);

  return (
    <div style={{ flex: "1 1 0", minWidth: 0 }}>

      {/* ── Cat header ── */}
      <div style={{
        background: "#0F172A", border: `1px solid ${cfg.color}44`,
        borderRadius: "14px", marginBottom: "18px",
        display: "flex", flexDirection: isMobile ? "column" : "row", overflow: "hidden",
      }}>
        {/* Portrait photo — left (desktop) / top (mobile) */}
        <div style={{ width: isMobile ? "100%" : "50%", flexShrink: 0, background: cfg.color + "11" }}>
          <img
            src={cfg.photo} alt={name}
            style={{ width: "100%", height: isMobile ? "220px" : "100%", objectFit: "cover", objectPosition: "top center", display: "block" }}
            onError={e => { e.target.style.display = "none"; }}
          />
        </div>

        {/* Right content */}
        <div style={{ flex: 1, padding: "20px 20px 20px 18px", display: "flex", flexDirection: "column" }}>
          {/* Name */}
          <div style={{ marginBottom: "14px" }}>
            <div style={{ fontSize: "26px", fontWeight: 700, color: cfg.color, lineHeight: 1 }}>{name}</div>
            <div style={{ fontSize: "14px", color: "#94A3B8", marginTop: "4px" }}>Born {cfg.dob} · {cfg.sex} · {cfg.coat}</div>
          </div>

          {/* Stats grid */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "7px", marginBottom: "14px" }}>
            {[
              { label: "Weight",     value: `${(latestWeight.lbs/2.20462).toFixed(2)} kg`, sub: latestWeight.date },
              { label: "Last Visit", value: lastVisit?.label ?? "—",   sub: null },
              { label: "Last Labs",  value: lastLabs?.label  ?? "—",   sub: null },

// ─── WeightChart ──────────────────────────────────────────────────────────────

function WeightChart({ name }) {
  const cfg  = catConfig[name];
  const data = weightHistory[name];
  const min  = Math.min(...data.map(d => d.lbs)) - 0.5;
  const max  = Math.max(...data.map(d => d.lbs)) + 0.5;
  const W = 200, H = 56;
  const pts = data.map((d, i) => ({
    x: data.length === 1 ? W / 2 : (i / (data.length - 1)) * W,
    y: H - ((d.lbs - min) / (max - min)) * H,
    ...d,
  }));
  const path = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
  return (
    <div style={{ background: "#020817", borderRadius: "8px", padding: "12px 14px", marginTop: "10px" }}>
      <div style={{ fontSize: "10px", color: "#94A3B8", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "8px" }}>
        Weight History (kg)
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "56px", overflow: "visible" }}>
        <path d={path} fill="none" stroke={cfg.color} strokeWidth="2" strokeLinejoin="round" />
        {pts.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="3.5" fill={cfg.color} />
            <text x={p.x} y={p.y - 7} textAnchor="middle" fill={cfg.color} fontSize="8">{(p.lbs/2.20462).toFixed(2)}</text>
            <text x={p.x} y={H + 13} textAnchor="middle" fill="#94A3B8" fontSize="7">{p.date}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function TravelMap() {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);

  React.useEffect(() => {
    if (mapInstanceRef.current || !mapRef.current) return;

    const map = L.map(mapRef.current, { center:[35,175], zoom:2, minZoom:2, maxZoom:10 });
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution:"© OpenStreetMap © CARTO", subdomains:"abcd", maxZoom:20,
    }).addTo(map);

    const fl = { weight:2, opacity:0.75, dashArray:"5, 4" };

    // Both cats: Texas → Denver → LAX (US coords shifted +360 for Pacific-centered map)
    L.polyline([[30.27,262.26],[39.74,255.01]], { ...fl, color:"#A78BFA" }).addTo(map);
    L.polyline([[39.74,255.01],[33.94,241.59]], { ...fl, color:"#A78BFA" }).addTo(map);
    // LAX → Seoul via Pacific (single segment, no antimeridian split needed with +360 coords)
    L.polyline([[33.94,241.59],[45,220],[55,197],[57,182],[52,162],[43,140],[37.46,126.44]], { ...fl, color:"#A78BFA" }).addTo(map);
    // Seoul → Chiang Mai
    L.polyline([[37.46,126.44],[18.77,98.96]], { ...fl, color:"#A78BFA" }).addTo(map);

    travelStops.forEach(stop => {
      const sz = stop.id === "chiangmai" ? 14 : 11;
      const icon = L.divIcon({
        className:"",
        html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${stop.color};border:2px solid #020817;box-shadow:0 0 0 3px ${stop.color}44;"></div>`,
        iconSize:[sz,sz], iconAnchor:[sz/2,sz/2], popupAnchor:[0,-sz],
      });
      const cats = stop.cats.map(c => c==="Pan" ? "🐱 Pan" : "🐾 Mia").join(" · ");
      L.marker(stop.coords, { icon })
        .bindPopup(`<div style="min-width:180px"><div style="font-weight:700;color:${stop.color};font-size:14px;margin-bottom:2px">${stop.name}</div><div style="color:#64748B;font-size:11px;margin-bottom:6px">${stop.subtitle}</div><div style="color:#94A3B8;font-size:11px">${cats} · ${stop.date}</div><div style="color:#CBD5E1;font-size:12px;margin-top:6px;line-height:1.5">${stop.note}</div></div>`)
        .addTo(map);
    });

    mapInstanceRef.current = map;
    return () => { map.remove(); mapInstanceRef.current = null; };
  }, []);

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:"20px" }}>
      <div ref={mapRef} style={{ width:"100%", height:"520px", borderRadius:"14px", overflow:"hidden", border:"1px solid #1E293B" }} />

      <div style={{ display:"flex", gap:"24px", flexWrap:"wrap", padding:"0 2px" }}>
        {[
          { color:"#A78BFA", label:"Texas → Colorado (both cats)" },
          { color:"#A78BFA", label:"Shared flight route" },
          { color:"#10B981", label:"Current home" },
        ].map(l => (
          <div key={l.label} style={{ display:"flex", alignItems:"center", gap:"8px" }}>
            <svg width="24" height="6"><line x1="0" y1="3" x2="24" y2="3" stroke={l.color} strokeWidth="2" strokeDasharray="5,3" /></svg>
            <span style={{ fontSize:"12px", color:"#94A3B8" }}>{l.label}</span>
          </div>
        ))}
      </div>

      <div style={{ background:"#0F172A", border:"1px solid #1E293B", borderRadius:"14px", padding:"20px 24px" }}>
        <div style={{ fontSize:"12px", fontWeight:700, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:"16px" }}>Journey</div>
        {travelStops.map((stop, i) => (
          <div key={stop.id} style={{ display:"flex", gap:"14px" }}>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:"14px", flexShrink:0 }}>
              <div style={{ width:"12px", height:"12px", borderRadius:"50%", background:stop.color, flexShrink:0, marginTop:"4px", boxShadow:`0 0 0 3px ${stop.color}33` }} />
              {i < travelStops.length - 1 && <div style={{ width:"2px", flexGrow:1, background:"#1E293B", minHeight:"24px", margin:"4px 0" }} />}
            </div>
            <div style={{ paddingBottom: i < travelStops.length - 1 ? "14px" : 0, flex:1 }}>
              <div style={{ fontSize:"15px", fontWeight:700, color:stop.color }}>{stop.name}</div>
              <div style={{ fontSize:"12px", color:"#64748B", marginTop:"2px" }}>
                {stop.cats.map(c => c==="Pan" ? "🐱" : "🐾").join(" ")} · {stop.date}
              </div>
              <div style={{ fontSize:"12px", color:"#94A3B8", marginTop:"3px", lineHeight:1.5 }}>{stop.note}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

const testInfo = {
  // ── CBC ──────────────────────────────────────────────────────────────────
  RBC:          { name:"Red Blood Cells",              good:"stable",  desc:"Counts oxygen-carrying red cells. Too few = anemia; too many = thickened blood." },
  HCT:          { name:"Hematocrit",                   good:"stable",  desc:"% of blood made up of red cells. Drops with anemia; rises with dehydration." },
  HGB:          { name:"Hemoglobin",                   good:"stable",  desc:"The protein inside red cells that carries oxygen. Closely mirrors HCT." },
  MCV:          { name:"Mean Corpuscular Volume",      good:"stable",  desc:"Average red cell size. Small = iron deficiency; large = B12 or folate issues." },
  MCH:          { name:"Mean Corpuscular Hgb",         good:"stable",  desc:"Average hemoglobin per red cell — reflects red cell quality alongside MCV." },
  MCHC:         { name:"Hgb Concentration",            good:"stable",  desc:"Hemoglobin concentration inside red cells. Low = poorly filled, pale cells." },
  WBC:          { name:"White Blood Cells",            good:"stable",  desc:"Immune cells that fight infection. High = infection/inflammation; low = immune suppression. Lab ref range (4–19K) is biased by pro-inflammatory diets — Uniquely Cats considers 2–10K the true ideal for cats on raw/species-appropriate food." },
  NEU:          { name:"Neutrophils",                  good:"stable",  desc:"First-responder immune cells. High = bacterial infection or stress; low = vulnerability to infection." },
  LYM:          { name:"Lymphocytes",                  good:"stable",  desc:"Immune cells for viral response and long-term immunity. Imbalance with neutrophils drives NLR flagging." },
  MONO:         { name:"Monocytes",                    good:"stable",  desc:"Immune cells that clean up tissue damage and fight chronic infection." },
  EOS:          { name:"Eosinophils",                  good:"stable",  desc:"Fight parasites and drive allergic reactions. High = parasite burden or allergy." },
  BASO:         { name:"Basophils",                    good:"stable",  desc:"Rare immune cells involved in allergic response. Usually near zero in healthy cats." },
  NLR:          { name:"Neutrophil:Lymphocyte Ratio",  good:"stable",  desc:"Balance of innate vs adaptive immunity. Persistently low (Pan & Mia) = possible immune imbalance — monitor." },
  PLT:          { name:"Platelets",                    good:"higher",  desc:"Clotting cells that stop bleeding. Persistently LOW in both Pan and Mia — a key monitoring target." },
  MPV:          { name:"Mean Platelet Volume",         good:"stable",  desc:"Average platelet size. Large platelets = bone marrow compensating for low count by releasing them early." },
  PCT:          { name:"Plateletcrit",                 good:"stable",  desc:"% of blood made up of platelets. Mirrors PLT count." },
  "RETIC-HGB":  { name:"Reticulocyte Hemoglobin",      good:"higher",  desc:"Hemoglobin in newly-made red cells. LOW = iron-deficient red cell production (flagged for Pan, Mar '25)." },
  // ── Chemistry ────────────────────────────────────────────────────────────
  SDMA:         { name:"Symmetric Dimethylarginine",   good:"lower",   desc:"Earliest kidney function marker — detects decline years before creatinine rises. Keep as low as possible." },
  GLU:          { name:"Glucose (Blood Sugar)",        good:"stable",  desc:"Blood sugar. Persistently high = diabetes risk; low = hypoglycemia. Cats can spike from vet stress alone." },
  CREA:         { name:"Creatinine",                   good:"lower",   desc:"Kidney waste product. Rising creatinine = reduced filtration — a later-stage kidney marker than SDMA." },
  BUN:          { name:"Blood Urea Nitrogen",          good:"lower",   desc:"Another kidney waste marker. Also rises with dehydration or high-protein diet — always interpret with CREA." },
  PHOS:         { name:"Phosphorus",                   good:"lower",   desc:"Mineral regulated by kidneys. Rises as kidney function declines — an important long-term trend to watch." },
  CA:           { name:"Calcium",                      good:"stable",  desc:"Vital mineral for bones, nerves, and heart rhythm. Both high and low are serious — stable in range is the goal." },
  Na:           { name:"Sodium",                       good:"stable",  desc:"Electrolyte controlling fluid balance. Abnormal levels signal dehydration, kidney, or heart problems." },
  K:            { name:"Potassium",                    good:"stable",  desc:"Electrolyte critical for heart muscle. Low = weakness; high = dangerous heart arrhythmia. Keep in range." },
  Cl:           { name:"Chloride",                     good:"stable",  desc:"Electrolyte balancing sodium and acid-base status. Tracks closely with sodium." },
  TCO2:         { name:"Total CO₂ / Bicarbonate",      good:"stable",  desc:"Measures acid-base balance. Low = metabolic acidosis (seen with kidney disease); high = alkalosis." },
  TP:           { name:"Total Protein",                good:"stable",  desc:"Combined albumin + globulin. Low = poor nutrition or liver disease; high = dehydration or chronic infection." },
  ALB:          { name:"Albumin",                      good:"stable",  desc:"Main liver-made protein. Low = liver disease or malnutrition. High (Mia, May '25) = likely dehydration." },

function fmtLabDate(d) {
  const months = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [y, m] = d.split("-");
  return `${months[+m]} '${y.slice(2)}`;
}

        {["Pan", "Mia"].map(name => {
          const cfg   = catConfig[name];
          const items = labData[name][panel] || [];
          if (!items.length) return (
            <div key={name} style={{ background: "#0F172A", border: `1px solid ${cfg.color}22`, borderRadius: "12px", padding: "20px", color: "#475569", fontSize: "13px", flex: isMobile ? "none" : "1 1 0", minWidth: 0 }}>
              {cfg.emoji} {name} — no data for this panel yet
            </div>
          );

          // All unique dates across all tests in this panel, sorted oldest → newest
          const dates = [...new Set(items.flatMap(it => it.points.map(p => p.date)))].sort();
          const colW = 82;
          const gridCols = `80px 88px 72px${dates.map(() => ` ${colW}px`).join("")}`;

          // Mini sparkline for a single test row
          const Sparkline = ({ item }) => {
            const pts = item.points.slice().sort((a, b) => a.date.localeCompare(b.date));
            if (pts.length < 2) return <div style={{ width: 60, height: 28 }} />;
            const W = 60, H = 28, pad = 3;
            const vals = pts.map(p => p.val);
            const lo = Math.min(...vals, item.ref[0]);
            const hi = Math.max(...vals, item.ref[1]);
            const rng = hi - lo || 1;
            const toX = i => pad + (i / (pts.length - 1)) * (W - pad * 2);
            const toY = v => H - pad - ((v - lo) / rng) * (H - pad * 2);
            const refY0 = toY(item.ref[1]);
            const refY1 = toY(item.ref[0]);
            const anyOut = pts.some(p => p.val < item.ref[0] || p.val > item.ref[1]);
            const lineCol = anyOut ? "#F59E0B" : cfg.color;
            const polyPts = pts.map((p, i) => `${toX(i).toFixed(1)},${toY(p.val).toFixed(1)}`).join(" ");
            const lx = toX(pts.length - 1), ly = toY(pts[pts.length - 1].val);
            return (
              <svg width={W} height={H} style={{ display: "block", overflow: "visible" }}>
                <rect x={pad} y={Math.min(refY0, refY1)} width={W - pad * 2} height={Math.abs(refY1 - refY0)} fill="#1E293B" opacity="0.7" rx="1" />
                <polyline points={polyPts} fill="none" stroke={lineCol} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
                <circle cx={lx} cy={ly} r="2.5" fill={lineCol} />
              </svg>
            );
          };

          return (
            <div key={name} style={{ background: "#0F172A", border: `1px solid ${cfg.color}33`, borderRadius: "12px", overflow: "hidden", flex: isMobile ? "none" : "1 1 0", minWidth: 0 }}>
              {/* Card header */}

                <span style={{ fontSize: "15px" }}>{cfg.emoji}</span>
                <span style={{ fontSize: "15px", fontWeight: 700, color: cfg.color }}>{name}</span>
                <span style={{ fontSize: "11px", color: "#475569" }}>
                  {`${dates.length} result set${dates.length !== 1 ? "s" : ""} · Chiang Mai Center Animal Hospital`}
                </span>
              </div>

              {/* Scrollable grid */}
              <div style={{ overflowX: "auto" }}>
                <div style={{ minWidth: "max-content" }}>

                  {/* Column headers */}
                  <div style={{ display: "grid", gridTemplateColumns: gridCols, background: "#020817", borderBottom: "1px solid #1E293B" }}>
                    <div style={{ padding: "8px 14px", fontSize: "11px", fontWeight: 700, color: "#64748B", textTransform: "uppercase", letterSpacing: "0.08em" }}>Test</div>
                    <div style={{ padding: "8px 10px", fontSize: "11px", fontWeight: 700, color: "#64748B", textTransform: "uppercase", letterSpacing: "0.08em" }}>Ref Range</div>
                    <div style={{ padding: "8px 6px", fontSize: "11px", fontWeight: 700, color: "#64748B", textTransform: "uppercase", letterSpacing: "0.08em", textAlign: "center" }}>Trend</div>
                    {dates.map((d, di) => {
                      const isLatest = di === dates.length - 1;
                      return (
                        <div key={d} style={{ padding: "8px 6px", textAlign: "center" }}>
                          <div style={{ fontSize: "13px", fontWeight: 700, color: isLatest ? cfg.color : "#64748B" }}>{fmtLabDate(d)}</div>
                          {isLatest && <div style={{ fontSize: "10px", color: "#475569", marginTop: "1px" }}>latest</div>}
                        </div>
                      );
                    })}
                  </div>

                  {/* Data rows */}
                  {items.map((item, ri) => {
                    const pointMap = Object.fromEntries(item.points.map(p => [p.date, p.val]));
                    const anyOut = item.points.some(p => p.val < item.ref[0] || p.val > item.ref[1]);
                    return (
                      <div key={item.test} style={{
                        display: "grid", gridTemplateColumns: gridCols,
                        borderBottom: ri < items.length - 1 ? "1px solid #0D1424" : "none",
                        background: ri % 2 === 0 ? "transparent" : "#020817",
                      }}>
                        {/* Test name */}
                        <div
                          style={{ padding: "9px 14px", fontFamily: "monospace", fontSize: "14px", color: anyOut ? "#F1F5F9" : "#94A3B8", fontWeight: anyOut ? 600 : 400, cursor: "help" }}
                          onMouseEnter={e => { const r = e.currentTarget.getBoundingClientRect(); setTip({ test: item.test, x: r.right + 10, y: r.top }); }}
                          onMouseLeave={() => setTip(null)}
                        >
                          {item.test}
                          {item.unit && <span style={{ fontSize: "11px", color: "#475569", marginLeft: "4px" }}>{item.unit}</span>}
                        </div>
                        {/* Ref range */}
                        <div style={{ padding: "9px 10px", fontSize: "12px", color: "#64748B", display: "flex", alignItems: "center" }}>
                          {item.ref[0]}–{item.ref[1]}
                        </div>
                        {/* Sparkline */}
                        <div style={{ padding: "4px 6px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                          <Sparkline item={item} />
                          {(() => {
                            const info = testInfo[item.test];
                            if (!info) return null;
                            const g = info.good;
                            return (
                              <div style={{ fontSize: "10px", textAlign: "center", marginTop: "2px", color: g === "lower" ? "#60A5FA" : g === "higher" ? "#34D399" : "#64748B" }}>
                                {g === "lower" ? "↓ better" : g === "higher" ? "↑ better" : "↔ stable"}
                              </div>
                            );
                          })()}
                        </div>
                        {/* Value cells */}
                        {dates.map((d, di) => {
                          const val = pointMap[d];
                          const isLatest = di === dates.length - 1;
                          if (val === undefined) return (
                            <div key={d} style={{ padding: "9px 6px", textAlign: "center", color: "#334155", fontSize: "14px" }}>—</div>
                          );
                          const isHigh = val > item.ref[1];
                          const isLow  = val < item.ref[0];
                          const isOut  = isHigh || isLow;
                          const col = isOut
                            ? (isHigh ? "#EF4444" : "#F59E0B")
                            : isLatest ? "#F1F5F9" : "#94A3B8";
                          return (
                            <div key={d} style={{
                              padding: "9px 6px", textAlign: "center",
                              fontSize: "14px", fontWeight: isOut ? 700 : isLatest ? 600 : 400,
                              color: col,
                              background: isOut ? (isHigh ? "#EF444408" : "#F59E0B08") : "transparent",
                            }}>
                              {val}
                              {isOut && <div style={{ fontSize: "10px", color: isHigh ? "#EF4444" : "#F59E0B", lineHeight: 1 }}>{isHigh ? "▲" : "▼"}</div>}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}

                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const isMobile = useIsMobile();
  const [view,       setView]       = useState("timeline");
  const [typeFilter, setTypeFilter] = useState("All");
  const [search,     setSearch]     = useState("");

  const navBtn = (id, label) => (
    <button onClick={() => setView(id)} style={{
      padding: isMobile ? "10px 12px" : "7px 16px", borderRadius: "8px", border: "none",
      background: view === id ? "#1E293B" : "transparent",
      color: view === id ? "#F1F5F9" : "#94A3B8",
      fontSize: "13px", fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
    }}>{label}</button>
  );

  return (
    <div style={{ minHeight: "100vh", background: "#020817", padding: isMobile ? "16px 12px" : "32px 40px" }}>
      <div style={{ maxWidth: "1500px", margin: "0 auto" }}>

        {/* ── Header ── */}
        <div style={{ marginBottom: "28px" }}>
<div style={{ display: "flex", flexDirection: isMobile ? "column" : "row", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "12px" }}>
            <div>
              <h1 style={{ fontSize: "32px", fontWeight: 700, color: "#F8FAFC", lineHeight: 1.2 }}>
                Pan &amp; Mia · Health Monitor
              </h1>
              <div style={{ marginTop: "6px", display: "flex", gap: "16px", alignItems: "center" }}>
                <span style={{ fontSize: "15px", color: catConfig.Pan.color }}>🐱 Pan</span>
                <span style={{ fontSize: "15px", color: catConfig.Mia.color }}>🐾 Mia</span>
                <span style={{ fontSize: "13px", color: "#94A3B8" }}>· Leanne Woodmass</span>
              </div>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: "4px", background: "#0F172A", borderRadius: "10px", padding: "4px" }}>
              {navBtn("overview",  "📊 Overview")}
              {navBtn("timeline",  "📅 Timeline")}
              {navBtn("labs",      "🧪 Labs")}
              {navBtn("about",     "🐱 About")}
              {navBtn("petsitter", "🏠 Pet Sitter")}
              {navBtn("travel",    "🗺️ Travel")}
            </div>
          </div>
        </div>


        {/* ── Overview ── */}
        {view === "overview" && <Overview />}

        {/* ── Labs ── */}
        {view === "labs" && <Labs />}

        {/* ── About ── */}
        {view === "about" && <About />}

        {/* ── Pet Sitter ── */}
        {view === "petsitter" && <PetSitter />}

        {/* ── Travel Map ── */}
        {view === "travel" && <TravelMap />}

        {/* ── Timeline ── */}
        {view === "timeline" && (
          <div>
            {/* Controls bar */}
            <div style={{ marginBottom: "20px", display: "flex", flexWrap: "wrap", gap: "8px", alignItems: "center" }}>
              <input
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="Search events…"
                style={{
                  background: "#0F172A", border: "1px solid #1E293B",
                  borderRadius: "8px", padding: "7px 12px", color: "#F1F5F9",
                  fontSize: "14px", outline: "none", fontFamily: "Georgia, serif",
                  width: isMobile ? "100%" : "180px",
                }}
                onFocus={e => e.target.style.borderColor = "#94A3B8"}
                onBlur={e => e.target.style.borderColor = "#1E293B"}
              />
              <div style={{ width: "1px", height: "20px", background: "#1E293B" }} />
              {["All", "visit", "labs", "vaccine", "finding", "other"].map(t => {
                const active = typeFilter === t;
                const color  = t === "All" ? "#94A3B8" : typeConfig[t].color;
                return (
                  <button key={t} onClick={() => setTypeFilter(t)} style={{
                    padding: isMobile ? "8px 14px" : "5px 11px", borderRadius: "20px", border: "1px solid",
                    borderColor: active ? color : "#1E293B",
                    background: active ? color + "22" : "transparent",
                    color: active ? color : "#94A3B8",
                    fontSize: "13px", fontWeight: 600, cursor: "pointer",
                  }}>
                    {t === "All" ? "All Types" : typeConfig[t].icon + " " + typeConfig[t].label}
                  </button>
                );
              })}
            </div>

            {/* 2-column timeline */}
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: "24px", alignItems: "start" }}>
              <CatColumn name="Pan" typeFilter={typeFilter} search={search} />
              <CatColumn name="Mia" typeFilter={typeFilter} search={search} />
            </div>
          </div>
        )}

        <div style={{ marginTop: "48px", textAlign: "center", fontSize: "11px", color: "#1E293B" }}>
          Pan &amp; Mia · Health Monitor · {new Date().getFullYear()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
